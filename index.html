<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Bhakti Sudha | UX Portfolio</title>

<style>
body {margin:0;font-family:-apple-system;background:#020617;color:white}
.hero-banner{position:relative;height:100vh;display:flex;align-items:center;padding:0 80px;overflow:hidden}
#bg-canvas{position:absolute;inset:0;z-index:0}
.hero-overlay{position:absolute;inset:0;background:radial-gradient(circle at 30% 30%,rgba(15,23,42,0.5),rgba(2,6,23,0.95));z-index:1}
.hero-content{position:relative;z-index:2;max-width:700px}
.hero-title{font-size:64px;line-height:1.1}
.hero-title span{background:linear-gradient(90deg,#60a5fa,#a78bfa);-webkit-background-clip:text;-webkit-text-fill-color:transparent}
.hero-subtitle{margin-top:24px;color:#94a3b8}
.section{max-width:1000px;margin:auto;padding:100px 20px}
.grid{display:grid;grid-template-columns:1fr 1fr;gap:24px}
.card{background:rgba(255,255,255,0.05);border-radius:16px;overflow:hidden;transition:0.4s}
.card:hover{transform:translateY(-8px)}
.fade{opacity:0;transform:translateY(40px);transition:1s}
.fade.visible{opacity:1;transform:translateY(0)}
</style>
</head>

<body>

<section class="hero-banner">
<canvas id="bg-canvas"></canvas>
<div class="hero-overlay"></div>
<div class="hero-content">
<h1 class="hero-title">Designing scalable,<br><span>data-driven & AI-powered</span><br>user experiences.</h1>
<p class="hero-subtitle">Across healthcare, B2B, travel, and ecommerce—designing intelligent, scalable products from vision to real-world impact.</p>
</div>
</section>

<section class="section fade">
<h2>Selected Work</h2>
<div class="grid">
<div class="card"><img src="images/clip-ui-1.png"></div>
<div class="card"><img src="images/search-ui.png"></div>
</div>
</section>

<script>
const canvas=document.getElementById('bg-canvas');
const ctx=canvas.getContext('2d');
canvas.width=window.innerWidth;canvas.height=window.innerHeight;
let particles=[];
for(let i=0;i<80;i++){particles.push({x:Math.random()*canvas.width,y:Math.random()*canvas.height,vx:(Math.random()-0.5)*0.5,vy:(Math.random()-0.5)*0.5,size:Math.random()*2});}
function draw(){ctx.clearRect(0,0,canvas.width,canvas.height);
particles.forEach(p=>{p.x+=p.vx;p.y+=p.vy;ctx.beginPath();ctx.arc(p.x,p.y,p.size,0,Math.PI*2);ctx.fillStyle='rgba(96,165,250,0.6)';ctx.fill();});
requestAnimationFrame(draw);}draw();
</script>

</body>
</html>
