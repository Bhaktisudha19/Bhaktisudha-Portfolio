<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Bhakti Sudha | UX Portfolio</title>
<style>
html{scroll-behavior:smooth}
body{margin:0;font-family:-apple-system,BlinkMacSystemFont,sans-serif;background:#020617;color:white;overflow-x:hidden}
.nav{position:fixed;top:0;width:100%;padding:24px 60px;display:flex;justify-content:space-between;align-items:center;z-index:100;background:rgba(2,6,23,0.35);backdrop-filter:blur(16px);box-sizing:border-box}.nav a{color:#cbd5e1;text-decoration:none;margin-left:24px;font-size:14px;transition:.3s}.nav a:hover{color:white}
.hero-banner{position:relative;height:100vh;width:100vw;display:flex;align-items:center;padding:0 100px;overflow:hidden;background:radial-gradient(circle at top left,#0f172a,#020617 70%)}#bg-canvas{position:absolute;inset:0;width:100%;height:100%;z-index:0}.hero-overlay{position:absolute;inset:0;background:radial-gradient(circle at center,rgba(37,99,235,.12),rgba(2,6,23,.75));z-index:1}.hero-glow{position:absolute;width:900px;height:900px;border-radius:50%;background:radial-gradient(circle,rgba(96,165,250,.18),transparent 70%);top:-200px;right:-180px;filter:blur(40px);z-index:1}.hero-content{position:relative;z-index:2;max-width:860px}.hero-title{font-size:88px;line-height:.95;margin:0;font-weight:600;letter-spacing:-3px}.hero-title span{background:linear-gradient(90deg,#7dd3fc,#a78bfa);-webkit-background-clip:text;-webkit-text-fill-color:transparent}.hero-subtitle{margin-top:34px;font-size:22px;line-height:1.8;color:#cbd5e1;max-width:720px}.scroll-indicator{margin-top:60px;color:#94a3b8;font-size:14px;letter-spacing:1px}
.section{max-width:1400px;margin:auto;padding:120px 40px}.section-title{font-size:42px;margin-bottom:20px}
.featured-wrap{margin-top:60px;display:flex;flex-direction:column;gap:34px}.featured-tabs{display:flex;gap:14px}.tab{padding:16px 34px;border-radius:18px;background:rgba(255,255,255,.04);border:1px solid rgba(255,255,255,.06);color:#94a3b8}.tab.active{background:linear-gradient(135deg,rgba(96,165,250,.28),rgba(167,139,250,.18));color:white}.featured-card{display:grid;grid-template-columns:1.1fr .9fr;min-height:460px;background:radial-gradient(circle at top left,rgba(37,99,235,.22),rgba(2,6,23,.95));border:1px solid rgba(255,255,255,.06);border-radius:40px;overflow:hidden;box-shadow:0 30px 100px rgba(0,0,0,.4)}
.carousel{position:relative;height:100%;overflow:hidden}.carousel-track{display:flex;width:100%;height:100%;transition:transform .6s ease}.carousel-slide{min-width:100%;height:100%}.carousel-slide img{width:100%;height:100%;object-fit:cover;display:block;opacity:.96}.carousel-btn{position:absolute;top:50%;transform:translateY(-50%);width:54px;height:54px;border-radius:50%;border:1px solid rgba(255,255,255,.12);background:rgba(2,6,23,.55);color:white;font-size:22px;display:flex;align-items:center;justify-content:center;cursor:pointer;backdrop-filter:blur(12px)}.carousel-btn.prev{left:20px}.carousel-btn.next{right:20px}
.featured-content{display:flex;flex-direction:column;justify-content:center;padding:56px}.pill{display:inline-flex;width:max-content;padding:10px 18px;border-radius:999px;border:1px solid rgba(167,139,250,.3);background:rgba(76,29,149,.12);font-size:12px;letter-spacing:2px;color:#c4b5fd;margin-bottom:24px}.featured-content h2{font-size:58px;line-height:1;margin:0 0 24px 0;letter-spacing:-2px}.featured-desc{font-size:18px;line-height:1.7;color:#94a3b8;max-width:520px}.tag-row{display:flex;flex-wrap:wrap;gap:12px;margin-top:30px}.tag{padding:12px 18px;border-radius:18px;background:rgba(255,255,255,.04);border:1px solid rgba(255,255,255,.06);color:#d1d5db}.cta{margin-top:36px;display:inline-flex;align-items:center;gap:14px;width:max-content;padding:18px 30px;border-radius:22px;background:rgba(255,255,255,.05);border:1px solid rgba(255,255,255,.08);color:white;text-decoration:none;font-size:16px;transition:.3s}.cta:hover{transform:translateY(-4px);border-color:rgba(96,165,250,.4)}
.fade{opacity:0;transform:translateY(40px);transition:1s ease}.fade.visible{opacity:1;transform:translateY(0)}
@media(max-width:1000px){.hero-banner{padding:0 40px}.hero-title{font-size:58px}.hero-subtitle{font-size:18px}.featured-card{grid-template-columns:1fr}.featured-content{padding:36px}.featured-content h2{font-size:42px}.featured-desc{font-size:16px}}
@media(max-width:768px){.nav{padding:20px}.hero-banner{padding:0 24px}.hero-title{font-size:44px;letter-spacing:-1px}.hero-subtitle{font-size:16px}.section{padding:100px 24px}.featured-content{padding:28px}.featured-card{min-height:auto}}
</style>
</head>
<body>
<nav class="nav"><div>Bhakti Sudha</div><div><a href="#work">Work</a><a href="#about">About</a><a href="#contact">Contact</a></div></nav>
<section class="hero-banner"><canvas id="bg-canvas"></canvas><div class="hero-overlay"></div><div class="hero-glow"></div><div class="hero-content"><h1 class="hero-title">Designing scalable,<br><span>data-driven & AI-powered</span><br>user experiences.</h1><p class="hero-subtitle">Across healthcare, B2B, travel, ecommerce and AI platforms — transforming complex systems into intelligent, scalable and impactful product experiences.</p><div class="scroll-indicator">↓ Scroll to explore</div></div></section>
<section id="work" class="section fade"><h2 class="section-title">Featured Case Studies</h2></section>
<script>const canvas=document.getElementById('bg-canvas');const ctx=canvas.getContext('2d');function resize(){canvas.width=window.innerWidth;canvas.height=window.innerHeight}resize();window.addEventListener('resize',resize);let mouse={x:null,y:null,radius:180};window.addEventListener('mousemove',e=>{mouse.x=e.x;mouse.y=e.y});let particles=[];for(let i=0;i<140;i++){particles.push({x:Math.random()*canvas.width,y:Math.random()*canvas.height,vx:(Math.random()-0.5)*0.6,vy:(Math.random()-0.5)*0.6,size:Math.random()*2.4+1})}function draw(){ctx.clearRect(0,0,canvas.width,canvas.height);particles.forEach(p=>{p.x+=p.vx;p.y+=p.vy;if(p.x<0||p.x>canvas.width)p.vx*=-1;if(p.y<0||p.y>canvas.height)p.vy*=-1;let dx=mouse.x-p.x;let dy=mouse.y-p.y;let dist=Math.sqrt(dx*dx+dy*dy);if(dist<mouse.radius){p.x-=dx*0.01;p.y-=dy*0.01}ctx.beginPath();ctx.arc(p.x,p.y,p.size,0,Math.PI*2);ctx.fillStyle='rgba(125,211,252,0.9)';ctx.shadowBlur=18;ctx.shadowColor='rgba(125,211,252,0.8)';ctx.fill()});for(let i=0;i<particles.length;i++){for(let j=i+1;j<particles.length;j++){let dx=particles[i].x-particles[j].x;let dy=particles[i].y-particles[j].y;let dist=Math.sqrt(dx*dx+dy*dy);if(dist<140){ctx.beginPath();ctx.moveTo(particles[i].x,particles[i].y);ctx.lineTo(particles[j].x,particles[j].y);ctx.strokeStyle='rgba(167,139,250,0.12)';ctx.lineWidth=1;ctx.stroke()}}}requestAnimationFrame(draw)}draw();</script>
</body>
</html>
